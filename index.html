<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix CSS - Construct</title>
</head>
<body class="neo-bg-matrix neo-flex neo-items-center neo-justify-center neo-absolute neo-inset-0 neo-m-0">

    <div class="neo-bg-gray-dark neo-border-2 neo-border-code neo-rounded-lg neo-p-8 neo-flex neo-flex-col neo-items-center">
        
        <h1 class="neo-text-xl neo-font-bold neo-text-code neo-mb-4 neo-m-0">
            System Access
        </h1>
        
        <p class="neo-text-sm neo-text-matrix neo-mb-8 neo-text-center">
            Select your path to enter the Matrix.
        </p>

        <div class="neo-grid neo-grid-cols-2 neo-gap-4 neo-mb-8">
            <div class="neo-bg-blue-pill neo-text-construct neo-font-bold neo-p-2 neo-rounded-sm neo-text-center">
                Blue Pill
            </div>
            <div class="neo-bg-red-pill neo-text-construct neo-font-bold neo-p-2 neo-rounded-sm neo-text-center">
                Red Pill
            </div>
        </div>

        <p class="neo-text-sm neo-font-light neo-text-code neo-m-0">
            > Connection established...
        </p>

    </div>

    <script type="module" src="./main.js"></script>
    
</body>
</html>
